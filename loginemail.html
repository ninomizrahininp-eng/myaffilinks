<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Debug Login</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="p-8 bg-gray-50">

  <div class="max-w-lg mx-auto bg-white p-8 rounded-2xl shadow">
    <h1 class="text-2xl font-bold mb-6 text-center">Debug Connexion Supabase</h1>
    
    <div id="status" class="p-4 bg-gray-100 rounded mb-6 text-sm font-mono whitespace-pre-wrap"></div>

    <form id="form" class="space-y-4">
      <input type="email" id="email" value="ninomizrahininp@gmail.com" class="w-full p-3 border rounded">
      <input type="password" id="password" placeholder="Mot de passe" class="w-full p-3 border rounded">
      <button type="submit" class="w-full bg-orange-500 text-white py-3 rounded font-medium">Se connecter (Debug)</button>
    </form>
  </div>

  <script type="module">
    import { supabase } from '/supabase/client.js'

    const status = document.getElementById('status')
    const form = document.getElementById('form')

    form.addEventListener('submit', async (e) => {
      e.preventDefault()
      const email = document.getElementById('email').value.trim()
      const password = document.getElementById('password').value

      status.innerHTML = '🔄 Connexion en cours...\n'

      try {
        const { error: authError } = await supabase.auth.signInWithPassword({ email, password })
        if (authError) {
          status.innerHTML += `❌ Auth failed: ${authError.message}\n`
          return
        }
        status.innerHTML += `✅ Auth OK\n`

        status.innerHTML += `🔍 Recherche profil pour email: ${email}\n`

        const { data: { user } } = await supabase.auth.getUser()
        
        const { data: profile, error: profileError } = await supabase
          .from('profiles')
          .select('role')
          .eq('user.id', user.id)
          .single()

        if (pError) {
          status.innerHTML += `❌ Profile query error: ${pError.message}\n`
          console.error(pError)
          return
        }

        if (!profile) {
          status.innerHTML += `❌ Aucune ligne trouvée pour cet email\n`
          return
        }

        status.innerHTML += `✅ Profil trouvé !\n`
        status.innerHTML += `Role = ${profile.role}\n`
        status.innerHTML += `ID = ${profile.id}\n`

        if (profile.role === 'admin' || profile.role?.toLowerCase() === 'admin') {
          status.innerHTML += `🎉 Redirection vers admin.html\n`
          setTimeout(() => window.location.href = 'admin.html', 1500)
        } else {
          status.innerHTML += `Redirection vers nos-affilinks.html\n`
          setTimeout(() => window.location.href = 'nos-affilinks.html', 1500)
        }

      } catch (err) {
        status.innerHTML += `❌ Erreur générale: ${err.message}\n`
        console.error(err)
      }
    })
  </script>
</body>
</html>
