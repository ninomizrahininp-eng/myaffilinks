<!DOCTYPE html>
<html lang="fr" class="scroll-smooth">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Connexion avec email - Myaffilinks.io</title>
  
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@200;300;400&display=swap" rel="stylesheet">

  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            primary: '#f97316',
            primaryDark: '#c2410c',
          },
          fontFamily: {
            nunito: ['Nunito', 'sans-serif'],
          }
        }
      }
    }
  </script>
</head>

<body class="bg-gray-50 min-h-screen font-sans">

  <div class="flex min-h-screen">

    <!-- GAUCHE : Image + POURQUOI PAS TOI -->
    <div class="hidden lg:block lg:w-1/2 p-8 xl:p-14 bg-gray-50">
      <div class="h-[94vh] mx-auto max-w-[52vw] xl:max-w-[620px] mt-[-5vh] relative">   
        <div class="relative w-full h-full rounded-3xl overflow-hidden shadow-[0_30px_70px_-12px_rgba(0,0,0,0.55)] ring-1 ring-black/5 bg-white">
          <img 
            src="/images/loginimage.png" 
            alt="Motivation"
            class="absolute inset-0 w-full h-full object-cover">

          <div class="absolute inset-0 flex items-start justify-center p-6 md:p-8 lg:p-10 xl:p-12 pointer-events-none">
            <h2 class="font-nunito font-light 
                       text-xl sm:text-2xl md:text-3xl lg:text-4xl xl:text-4xl
                       tracking-[0.04em] sm:tracking-[0.05em] md:tracking-[0.06em] lg:tracking-[0.08em] xl:tracking-[0.15em]
                       whitespace-nowrap
                       text-[#f97316] drop-shadow-[0_5px_12px_rgba(0,0,0,0.6)] leading-none"
                style="text-shadow: 
                  0 3px 6px rgba(0,0,0,0.5),
                  0 8px 16px rgba(0,0,0,0.35),
                  0 16px 32px rgba(0,0,0,0.25);">
              POURQUOI PAS TOI
            </h2>
          </div>
        </div>
      </div>
    </div>

    <!-- DROITE : Formulaire Supabase -->
    <div class="flex-1 flex items-center justify-center p-8">
      <div class="w-full max-w-md">
        <div class="text-center mb-10">
          <img src="/images/logoorange.svg" alt="Logo" class="mx-auto h-10 mb-4">
          <h1 class="text-3xl font-bold text-gray-900">Connexion avec email</h1>
        </div>

        <div id="error-message" class="hidden bg-red-100 border border-red-400 text-red-700 px-4 py-3 rounded-xl mb-6"></div>

        <form id="login-form" class="space-y-6">
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Email</label>
            <input type="email" id="email" required 
                   class="w-full px-4 py-3 border border-gray-300 rounded-xl focus:outline-none focus:ring-2 focus:ring-primary">
          </div>

          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Mot de passe</label>
            <input type="password" id="password" required 
                   class="w-full px-4 py-3 border border-gray-300 rounded-xl focus:outline-none focus:ring-2 focus:ring-primary">
          </div>

          <button type="submit" 
                  class="w-full bg-primary hover:bg-primaryDark text-white font-semibold py-4 rounded-xl transition-all">
            Se connecter
          </button>
        </form>

        <div class="text-center mt-8">
          <a href="login.html" class="text-gray-500 hover:text-gray-700">← Retour à la page de connexion</a>
        </div>
      </div>
    </div>
  </div>

  <!-- Script Supabase corrigé pour Vercel -->
  <script type="module">
    import { supabase } from '/supabase/client.js'   // ← Correction importante : / au début

    const form = document.getElementById('login-form')
    const errorMsg = document.getElementById('error-message')

    form.addEventListener('submit', async (e) => {
      e.preventDefault()

      const email = document.getElementById('email').value.trim()
      const password = document.getElementById('password').value

      errorMsg.classList.add('hidden')

      try {
        const { error: authError } = await supabase.auth.signInWithPassword({ email, password })

        if (authError) {
          errorMsg.textContent = authError.message || "Email ou mot de passe incorrect"
          errorMsg.classList.remove('hidden')
          return
        }

        // Vérifier le rôle
        const { data: profile } = await supabase
          .from('profiles')
          .select('role')
          .eq('email', email)
          .single()

        if (profile && profile.role === 'admin') {
          window.location.href = 'admin.html'
        } else {
          window.location.href = 'nos-affilinks.html'
        }

      } catch (err) {
        errorMsg.textContent = "Erreur de connexion. Vérifiez vos identifiants."
        errorMsg.classList.remove('hidden')
      }
    })
  </script>

</body>
</html>
