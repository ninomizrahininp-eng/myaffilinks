<!DOCTYPE html>
<html lang="fr" class="scroll-smooth">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Connexion - Myaffilinks.io</title>
  
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@200;300;400&display=swap" rel="stylesheet">

  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            primary: '#f97316',
            primaryDark: '#c2410c',
          },
          aspectRatio: {
            'login-image': '634.5 / 729.9',
          },
          fontFamily: {
            nunito: ['Nunito', 'sans-serif'],
          }
        }
      }
    }
  </script>
</head>

<body class="bg-gray-50 min-h-screen font-sans overflow-hidden">

  <div class="flex min-h-screen">

    <!-- GAUCHE : Image -->
    <div class="hidden lg:block lg:w-1/2 p-8 xl:p-14 bg-gray-50">
      <div class="h-[94vh] mx-auto max-w-[52vw] xl:max-w-[620px] mt-[-5vh] relative">   
        <div class="relative w-full h-full rounded-3xl overflow-hidden shadow-[0_30px_70px_-12px_rgba(0,0,0,0.55)] ring-1 ring-black/5 bg-white">
          <img 
            src="/images/loginimage.png" 
            alt="Grande image motivation"
            class="absolute inset-0 w-full h-full object-cover"
          />

          <div class="absolute inset-0 flex items-start justify-center p-6 md:p-8 lg:p-10 xl:p-12 pointer-events-none">
            <h2 class="font-nunito font-light 
                       text-xl sm:text-2xl md:text-3xl lg:text-4xl xl:text-4xl
                       tracking-[0.04em] sm:tracking-[0.05em] md:tracking-[0.06em] lg:tracking-[0.08em] xl:tracking-[0.15em]
                       whitespace-nowrap
                       text-[#f97316] drop-shadow-[0_5px_12px_rgba(0,0,0,0.6)] leading-none"
                style="text-shadow: 
                  0 3px 6px rgba(0,0,0,0.5),
                  0 8px 16px rgba(0,0,0,0.35),
                  0 16px 32px rgba(0,0,0,0.25);">
              POURQUOI PAS TOI
            </h2>
          </div>
        </div>
      </div>
    </div>

    <!-- DROITE : Formulaire -->
    <div class="w-full lg:w-1/2 flex items-center justify-center p-6 md:p-10 lg:p-12 bg-white">

      <div class="w-full max-w-md space-y-8">

        <div class="text-center pt-1">
          <img 
            src="/images/logoorange.svg" 
            alt="Myaffilinks Logo" 
            class="mx-auto block h-8 md:h-10 w-auto mb-3"
          />
        </div>

        <div class="text-center">
          <h1 class="text-3xl font-bold text-gray-900">Se connecter</h1>
          <p class="mt-2 text-gray-600">Accédez à votre espace Myaffilinks</p>
        </div>

        <button 
          onclick="alert('Connexion Google à venir')"
          class="w-full flex items-center justify-center gap-3 bg-white border border-gray-300 text-gray-900 py-3.5 rounded-xl font-medium hover:bg-gray-100 transition-all">
          <svg class="w-5 h-5" viewBox="0 0 24 24" fill="currentColor">
            <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.51h5.84c-.25 1.31-.98 2.42-2.07 3.16v2.63h3.35c1.96-1.81 3.09-4.47 3.09-7.99z"/>
          </svg>
          Continuer avec Google
        </button>

        <div class="relative my-6">
          <div class="absolute inset-0 flex items-center">
            <div class="w-full border-t border-gray-200"></div>
          </div>
          <div class="relative flex justify-center text-sm">
            <span class="px-4 bg-white text-gray-500">ou</span>
          </div>
        </div>

        <!-- Bouton modifié pour rediriger vers la vraie page de connexion email -->
        <a href="loginemail.html" 
           class="block w-full bg-primary text-white text-center py-4 rounded-xl font-semibold hover:bg-primaryDark transition-all duration-200 shadow-md hover:shadow-lg">
          <span class="mr-2 text-xl">✉</span> Se connecter avec l'e-mail
        </a>

        <div class="text-center text-sm space-y-3 mt-8">
          <p class="text-gray-600">
            Pas encore de compte ? 
            <a href="signup.html" class="text-primary hover:text-primaryDark font-medium transition">Inscrivez-vous</a>
          </p>
          <a href="index.html" class="inline-block text-gray-500 hover:text-gray-700 transition">
            ← Retour à l'accueil
          </a>
        </div>

      </div>
    </div>

  </div>

</body>
</html>
